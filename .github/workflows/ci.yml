name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # Weekly run: integration tests pin real upstream artifacts (the msb release,
  # container image tags) that can drift or disappear between pushes — a scheduled
  # run surfaces that breakage without waiting for the next commit.
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-typecheck:
    name: build, typecheck, lint, docs:verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run docs:verify

  unit-node:
    name: unit tests (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:node

  unit-bun:
    name: unit tests (bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to the version the suite is verified against: an unpinned
          # 'latest' bun changed how environment variables reach `bun test`
          # through npm scripts, silently flipping which backend the contract
          # suite ran on. Bump deliberately, with the IT matrix green locally.
          bun-version: "1.3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: bun install
      - run: npm run test:bun

  msb-linux:
    name: integration tests (microsandbox, linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to the version the suite is verified against: an unpinned
          # 'latest' bun changed how environment variables reach `bun test`
          # through npm scripts, silently flipping which backend the contract
          # suite ran on. Bump deliberately, with the IT matrix green locally.
          bun-version: "1.3.14"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/rightsize
          key: rightsize-msb-linux-${{ hashFiles('src/backend-msb/provisioner.ts') }}
      # Image-cache warming is incremental: registries rate-limit the runners'
      # shared IPs, so each run restores the newest prior cache, pulls what the
      # quota allows, and saves its grown copy even on failure — after a few
      # runs the cache is warm and pulls stop entirely.
      - uses: actions/cache/restore@v4
        with:
          path: ~/.microsandbox/cache
          key: msb-images-${{ runner.os }}-${{ github.run_id }}
          restore-keys: msb-images-${{ runner.os }}-
      - run: npm ci
      - run: bun install
      - name: node:test (serial IT)
        shell: bash
        run: RIGHTSIZE_BACKEND=microsandbox npm run test:node:it 2>&1 | tee /tmp/it-output.log
      - name: bun:test (serial IT)
        shell: bash
        run: RIGHTSIZE_BACKEND=microsandbox npm run test:bun:it 2>&1 | tee -a /tmp/it-output.log
      # msb's image cache can be left with an index pointing at layer files
      # that don't exist (a pull interrupted mid-write, or its concurrent-pull
      # race); msb then hard-errors on that image. Purge before saving so a
      # corrupted cache is never banked for future runs — the next run
      # re-pulls clean instead of restoring the poison. The backend self-heals
      # the race at boot, so this guard is the cache-hygiene backstop, not the
      # primary defense.
      - name: Purge image cache if corruption was observed
        if: always()
        shell: bash
        run: |
          if grep -q "cache error at .*No such file" /tmp/it-output.log 2>/dev/null; then
            echo "image-cache corruption detected — purging before save"
            rm -rf ~/.microsandbox/cache
          fi
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.microsandbox/cache
          key: msb-images-${{ runner.os }}-${{ github.run_id }}

  # Windows Hypervisor Platform, unlike macOS's Hypervisor.framework and
  # Linux's KVM above, was found ENABLED on hosted windows-2025 runners
  # (windows-spike findings, 2026-07-05: WHP already Enabled, msb doctor
  # green, boot/entrypoint/port-publish/exec-stdin all PASS) — so unlike
  # msb-macos below, this job runs the real msb integration suite, not a
  # docker-only fallback.
  msb-windows:
    name: integration tests (microsandbox, windows)
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          # Same pin as the other bun legs (see msb-linux's comment); verified
          # a Windows build of this exact version exists
          # (bun-windows-x64.zip in the v1.3.14 release assets) before pinning
          # it here rather than falling back to a different version.
          bun-version: "1.3.14"
      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\rightsize
          key: rightsize-msb-windows-${{ hashFiles('src/backend-msb/provisioner.ts') }}
      # Same incremental image-cache warming as msb-linux, windows-suffixed
      # keys (the cache key already includes ${{ runner.os }}, which resolves
      # to "Windows" here, but the path itself needs the Windows microsandbox
      # cache location rather than the Unix ~/.microsandbox/cache).
      - uses: actions/cache/restore@v4
        with:
          path: ~\.microsandbox\cache
          key: msb-images-${{ runner.os }}-${{ github.run_id }}
          restore-keys: msb-images-${{ runner.os }}-
      - run: npm ci
      - run: bun install
      - name: node:test (serial IT)
        shell: bash
        run: npm run test:node:it 2>&1 | tee /tmp/it-output.log
        env:
          RIGHTSIZE_BACKEND: microsandbox
      - name: bun:test (serial IT)
        shell: bash
        run: npm run test:bun:it 2>&1 | tee -a /tmp/it-output.log
        env:
          RIGHTSIZE_BACKEND: microsandbox
      # Same guard as msb-linux; `shell: bash` matters here since this job's
      # default shell is pwsh (bash is available on the hosted Windows images,
      # and `~` and /tmp resolve through git-bash's own path mapping).
      - name: Purge image cache if corruption was observed
        if: always()
        shell: bash
        run: |
          if grep -q "cache error at .*No such file" /tmp/it-output.log 2>/dev/null; then
            echo "image-cache corruption detected — purging before save"
            rm -rf ~/.microsandbox/cache
          fi
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: ~\.microsandbox\cache
          key: msb-images-${{ runner.os }}-${{ github.run_id }}

  # No msb-macos job: GitHub's hosted Apple Silicon runners are themselves VMs
  # without nested virtualization, so Hypervisor.framework VM creation fails
  # (msb: build_microvm VmSetup(VmCreate)). macOS support is verified on real
  # Apple Silicon hardware; a self-hosted mac runner could restore CI coverage.
  docker-fallback:
    name: integration tests (docker fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to the version the suite is verified against: an unpinned
          # 'latest' bun changed how environment variables reach `bun test`
          # through npm scripts, silently flipping which backend the contract
          # suite ran on. Bump deliberately, with the IT matrix green locally.
          bun-version: "1.3.14"
      - run: npm ci
      - run: bun install
      - name: node:test (serial IT)
        run: RIGHTSIZE_BACKEND=docker npm run test:node:it
      - name: bun:test (serial IT)
        run: RIGHTSIZE_BACKEND=docker npm run test:bun:it

  coverage:
    name: coverage (core, 80% line floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run coverage:core
